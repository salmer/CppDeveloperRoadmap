name: Check links

on:
  pull_request:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links in markdown files
        uses: lycheeverse/lychee-action@v2
        with:
          # --base . resolves relative links against the repo root;
          # 429 (rate limited) is accepted so busy sites don't fail the run.
          args: >-
            --base .
            --no-progress
            --accept 200..=204,429
            --max-retries 2
            "**/*.md"
          fail: true
